<div class="page" id="page-calendar">

  <div class="page-header">
    <div class="header-left">
        <div class="menu-trigger" onclick="toggleSidebar()">☰</div>
        <h1 class="page-title">Calendar</h1>
    </div>
  </div>

  <!-- Week Strip -->
  <div class="week-strip" id="week-strip-container">
    <!-- Rendered by JS -->
  </div>

  <!-- Day Schedule -->
  <div class="cal-day-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px;">
  
    <div style="display: flex; align-items: center; gap: 6px;">
      <span class="cal-day-title" id="cal-date" style="white-space: nowrap; font-size: 16px;">Today</span>
      <span class="cal-temp-badge" id="cal-temp" style="font-size: 11px; font-weight: 600; padding: 2px 6px; white-space: nowrap;">--° / --°</span>
    </div>
    
    <span class="cal-solar-badge" id="cal-solar" style="white-space: nowrap;">Loading...</span>
  </div>

  <div id="schedule-container">
      <!-- Rendered by JS -->
  </div>

  <!-- Tomorrow Forecast -->
  <div id="tomorrow-forecast-container">
      <!-- Rendered by JS -->
  </div>

</div>
